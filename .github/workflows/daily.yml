name: 📻 Daily Briefing

on:
  # Roda de segunda a sexta às 06h30 horário de Brasília (09h30 UTC)
  schedule:
    - cron: "30 9 * * 1-5"

  # Permite disparar manualmente pela aba Actions do GitHub
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necessário para commit + criar releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar episódio
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python main.py

      - name: Commitar feed atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml docs/episodes.json
          git diff --staged --quiet || \
            git commit -m "📻 Episódio $(date '+%Y-%m-%d')" && git push
