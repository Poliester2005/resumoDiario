<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Briefing Diário</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; color: #fff; }
    p  { color: #888; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .rss-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.85rem;
      color: #4ade80;
      word-break: break-all;
      margin-bottom: 1.5rem;
    }
    .steps { text-align: left; color: #aaa; font-size: 0.9rem; line-height: 2; }
    .steps strong { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📻</div>
    <h1>Meu Briefing Diário</h1>
    <p>Podcast privado gerado automaticamente toda manhã com notícias de tech e do mundo.</p>

    <div class="rss-box" id="feed-url">Carregando URL do feed…</div>

    <div class="steps">
      <strong>Como assinar no Pocket Casts:</strong><br>
      Descobrir → Busca → ícone de URL → cole o link acima<br><br>
      <strong>Como assinar no Overcast:</strong><br>
      Add Podcast → Add URL → cole o link acima
    </div>
  </div>

  <script>
    const url = `${location.origin}${location.pathname}feed.xml`;
    document.getElementById("feed-url").textContent = url;
  </script>
</body>
</html>
